name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MAIN_BUNDLE_ID: com.xiangyu.clash
      EXTENSION_BUNDLE_ID: com.xiangyu.clash.packettunnel
      APP_GROUP_ID: group.com.xiangyu.clash
      IOS_P12_FILE: ios_cert/dev.p12
      IOS_MAIN_MOBILEPROVISION_FILE: ios_cert/Clash_Main_Profile.mobileprovision
      IOS_EXTENSION_MOBILEPROVISION_FILE: ios_cert/Clash_Extension_Profile.mobileprovision
      IOS_P12_PASSWORD: 112233

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (signed from repository cert files)
        run: |
          set -eo pipefail
          if [ ! -f "$IOS_P12_FILE" ]; then
            echo "Missing certificate file: $IOS_P12_FILE"
            exit 1
          fi
          if [ ! -f "$IOS_MAIN_MOBILEPROVISION_FILE" ]; then
            echo "Missing main provisioning file: $IOS_MAIN_MOBILEPROVISION_FILE"
            exit 1
          fi
          if [ ! -f "$IOS_EXTENSION_MOBILEPROVISION_FILE" ]; then
            echo "Missing extension provisioning file: $IOS_EXTENSION_MOBILEPROVISION_FILE"
            exit 1
          fi
          CERT_PATH=$RUNNER_TEMP/cert.p12
          MAIN_PROFILE_PATH=$RUNNER_TEMP/main.mobileprovision
          EXTENSION_PROFILE_PATH=$RUNNER_TEMP/extension.mobileprovision
          MAIN_PROFILE_PLIST=$RUNNER_TEMP/main_profile.plist
          EXTENSION_PROFILE_PLIST=$RUNNER_TEMP/extension_profile.plist
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          IOS_P12_PASSWORD_CLEAN=$(printf %s "$IOS_P12_PASSWORD" | tr -d '\r\n')
          cp "$IOS_P12_FILE" "$CERT_PATH"
          cp "$IOS_MAIN_MOBILEPROVISION_FILE" "$MAIN_PROFILE_PATH"
          cp "$IOS_EXTENSION_MOBILEPROVISION_FILE" "$EXTENSION_PROFILE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD_CLEAN" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision
          security cms -D -i "$MAIN_PROFILE_PATH" > "$MAIN_PROFILE_PLIST"
          security cms -D -i "$EXTENSION_PROFILE_PATH" > "$EXTENSION_PROFILE_PLIST"
          MAIN_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$MAIN_PROFILE_PLIST")
          MAIN_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$MAIN_PROFILE_PLIST")
          EXTENSION_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$EXTENSION_PROFILE_PLIST")
          EXTENSION_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$EXTENSION_PROFILE_PLIST")
          cp "$MAIN_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$MAIN_PROFILE_UUID.mobileprovision"
          cp "$EXTENSION_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXTENSION_PROFILE_UUID.mobileprovision"
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$MAIN_PROFILE_PLIST")
          EXTENSION_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$EXTENSION_PROFILE_PLIST")
          if [ "$TEAM_ID" != "$EXTENSION_TEAM_ID" ]; then
            echo "Provisioning profiles belong to different teams"
            exit 1
          fi
          MAIN_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$MAIN_PROFILE_PLIST")
          EXTENSION_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$EXTENSION_PROFILE_PLIST")
          PROFILE_MAIN_BUNDLE_ID=${MAIN_APP_IDENTIFIER#${TEAM_ID}.}
          PROFILE_EXTENSION_BUNDLE_ID=${EXTENSION_APP_IDENTIFIER#${TEAM_ID}.}
          if [ "$PROFILE_MAIN_BUNDLE_ID" = "*" ] || [ "$PROFILE_EXTENSION_BUNDLE_ID" = "*" ]; then
            echo "Provisioning profile bundle id cannot be wildcard for Network Extension signing"
            exit 1
          fi
          if [ "$PROFILE_MAIN_BUNDLE_ID" != "$MAIN_BUNDLE_ID" ]; then
            echo "Main bundle id mismatch: expected $MAIN_BUNDLE_ID but profile is $PROFILE_MAIN_BUNDLE_ID"
            exit 1
          fi
          if [ "$PROFILE_EXTENSION_BUNDLE_ID" != "$EXTENSION_BUNDLE_ID" ]; then
            echo "Extension bundle id mismatch: expected $EXTENSION_BUNDLE_ID but profile is $PROFILE_EXTENSION_BUNDLE_ID"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" "$MAIN_PROFILE_PLIST" >/dev/null 2>&1; then
            echo "Main provisioning profile missing App Groups entitlement"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension" "$MAIN_PROFILE_PLIST" >/dev/null 2>&1; then
            echo "Main provisioning profile missing Network Extensions entitlement"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" "$EXTENSION_PROFILE_PLIST" >/dev/null 2>&1; then
            echo "Extension provisioning profile missing App Groups entitlement"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension" "$EXTENSION_PROFILE_PLIST" >/dev/null 2>&1; then
            echo "Extension provisioning profile missing Network Extensions entitlement"
            exit 1
          fi
          MAIN_APP_GROUPS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" "$MAIN_PROFILE_PLIST" 2>/dev/null || true)
          EXTENSION_APP_GROUPS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" "$EXTENSION_PROFILE_PLIST" 2>/dev/null || true)
          MAIN_NETWORK_EXT=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension" "$MAIN_PROFILE_PLIST" 2>/dev/null || true)
          EXTENSION_NETWORK_EXT=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension" "$EXTENSION_PROFILE_PLIST" 2>/dev/null || true)
          if [[ "$MAIN_APP_GROUPS" != *"$APP_GROUP_ID"* ]] || [[ "$EXTENSION_APP_GROUPS" != *"$APP_GROUP_ID"* ]]; then
            echo "Provisioning profile App Groups mismatch. Expected $APP_GROUP_ID"
            echo "Main profile groups:"
            echo "$MAIN_APP_GROUPS"
            echo "Extension profile groups:"
            echo "$EXTENSION_APP_GROUPS"
            exit 1
          fi
          if [[ "$MAIN_NETWORK_EXT" != *"packet-tunnel-provider"* ]] || [[ "$EXTENSION_NETWORK_EXT" != *"packet-tunnel-provider"* ]]; then
            echo "Provisioning profile Network Extension mismatch. Expected packet-tunnel-provider"
            echo "Main profile networkextension:"
            echo "$MAIN_NETWORK_EXT"
            echo "Extension profile networkextension:"
            echo "$EXTENSION_NETWORK_EXT"
            exit 1
          fi
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F\" -v team="($TEAM_ID)" 'NF>=2 && $2 ~ team {print $2; exit}')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No codesigning identity matching provisioning team $TEAM_ID found in keychain. Refusing to fall back."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          if [[ "$SIGNING_IDENTITY" != *"Developer"* ]] && [[ "$SIGNING_IDENTITY" != *"Apple Development"* ]]; then
            echo "Unexpected signing identity: $SIGNING_IDENTITY. Refusing to fall back."
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Print Entitlements" "$MAIN_PROFILE_PLIST"
          /usr/libexec/PlistBuddy -c "Print Entitlements" "$EXTENSION_PROFILE_PLIST"
          EXPORT_METHOD="development"
          EXPORT_SIGNING_CERT="Apple Development"
          if [[ "$SIGNING_IDENTITY" == *"iPhone Developer"* ]]; then
            EXPORT_SIGNING_CERT="iPhone Developer"
          fi
          GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$MAIN_PROFILE_PLIST")
          EXTENSION_GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$EXTENSION_PROFILE_PLIST")
          if [ "$GET_TASK_ALLOW" != "true" ]; then
            echo "Provisioning profile is not a development profile (get-task-allow != true). Refusing to fall back."
            exit 1
          fi
          if [ "$EXTENSION_GET_TASK_ALLOW" != "true" ]; then
            echo "Extension provisioning profile is not a development profile (get-task-allow != true). Refusing to fall back."
            exit 1
          fi
          export MAIN_PROFILE_PLIST EXTENSION_PROFILE_PLIST
          python - <<'PY'
          import os
          import datetime
          import plistlib
          import sys
          main_path = os.environ["MAIN_PROFILE_PLIST"]
          ext_path = os.environ["EXTENSION_PROFILE_PLIST"]
          with open(main_path, "rb") as f:
              main = plistlib.load(f)
          with open(ext_path, "rb") as f:
              ext = plistlib.load(f)
          now = datetime.datetime.now(datetime.timezone.utc)
          main_exp = main.get("ExpirationDate")
          ext_exp = ext.get("ExpirationDate")
          if main_exp is None or ext_exp is None:
              print("Provisioning profile missing ExpirationDate")
              sys.exit(1)
          if main_exp.tzinfo is None:
              main_exp = main_exp.replace(tzinfo=datetime.timezone.utc)
          if ext_exp.tzinfo is None:
              ext_exp = ext_exp.replace(tzinfo=datetime.timezone.utc)
          if main_exp <= now or ext_exp <= now:
              print("Provisioning profile is expired")
              sys.exit(1)
          PY
          echo "Resolved signing context: team=$TEAM_ID export_method=$EXPORT_METHOD main_profile=$MAIN_PROFILE_NAME($MAIN_PROFILE_UUID) extension_profile=$EXTENSION_PROFILE_NAME($EXTENSION_PROFILE_UUID)"
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          rm -f "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string $EXPORT_METHOD" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string $EXPORT_SIGNING_CERT" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$MAIN_BUNDLE_ID string $MAIN_PROFILE_NAME" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$EXTENSION_BUNDLE_ID string $EXTENSION_PROFILE_NAME" "$EXPORT_PLIST"
          pushd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/Runner.xcarchive" archive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            "Runner:DEVELOPMENT_TEAM=$TEAM_ID" \
            "PacketTunnel:DEVELOPMENT_TEAM=$TEAM_ID" \
            "Runner:CODE_SIGN_STYLE=Manual" \
            "PacketTunnel:CODE_SIGN_STYLE=Manual" \
            "Runner:CODE_SIGN_IDENTITY=$SIGNING_IDENTITY" \
            "PacketTunnel:CODE_SIGN_IDENTITY=$SIGNING_IDENTITY" \
            "Runner:PRODUCT_BUNDLE_IDENTIFIER=$MAIN_BUNDLE_ID" \
            "PacketTunnel:PRODUCT_BUNDLE_IDENTIFIER=$EXTENSION_BUNDLE_ID" \
            "Runner:PROVISIONING_PROFILE=$MAIN_PROFILE_UUID" \
            "PacketTunnel:PROVISIONING_PROFILE=$EXTENSION_PROFILE_UUID" \
            "Runner:PROVISIONING_PROFILE_SPECIFIER=$MAIN_PROFILE_NAME" \
            "PacketTunnel:PROVISIONING_PROFILE_SPECIFIER=$EXTENSION_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/Runner.xcarchive" \
            -exportOptionsPlist "$EXPORT_PLIST" \
            -exportPath "$PWD/../build/ios/ipa"
          popd

      - name: Validate exported IPA payload
        run: |
          set -eo pipefail
          IPA_FILE=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found in build/ios/ipa"
            exit 1
          fi
          IPA_EXTRACT_DIR="$RUNNER_TEMP/ipa_extract"
          rm -rf "$IPA_EXTRACT_DIR"
          mkdir -p "$IPA_EXTRACT_DIR"
          unzip -q "$IPA_FILE" -d "$IPA_EXTRACT_DIR"
          APP_DIR=$(find "$IPA_EXTRACT_DIR/Payload" -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "Payload app not found in IPA"
            exit 1
          fi
          APP_INFO_PLIST="$APP_DIR/Info.plist"
          APP_MIN_IOS=$(/usr/libexec/PlistBuddy -c "Print MinimumOSVersion" "$APP_INFO_PLIST")
          APP_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_INFO_PLIST")
          if [ "$APP_BUNDLE_ID" != "$MAIN_BUNDLE_ID" ]; then
            echo "IPA main bundle id mismatch: expected $MAIN_BUNDLE_ID but got $APP_BUNDLE_ID"
            exit 1
          fi
          APPEX_DIR=$(find "$APP_DIR/PlugIns" -maxdepth 1 -name '*.appex' | head -n 1)
          if [ -z "$APPEX_DIR" ]; then
            echo "PacketTunnel appex missing in IPA"
            exit 1
          fi
          APPEX_INFO_PLIST="$APPEX_DIR/Info.plist"
          APPEX_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APPEX_INFO_PLIST")
          if [ "$APPEX_BUNDLE_ID" != "$EXTENSION_BUNDLE_ID" ]; then
            echo "IPA extension bundle id mismatch: expected $EXTENSION_BUNDLE_ID but got $APPEX_BUNDLE_ID"
            exit 1
          fi
          APP_EMBEDDED="$APP_DIR/embedded.mobileprovision"
          APPEX_EMBEDDED="$APPEX_DIR/embedded.mobileprovision"
          if [ ! -f "$APP_EMBEDDED" ] || [ ! -f "$APPEX_EMBEDDED" ]; then
            echo "embedded.mobileprovision missing in app or extension"
            exit 1
          fi
          APP_PROFILE_PLIST="$RUNNER_TEMP/ipa_main_profile.plist"
          APPEX_PROFILE_PLIST="$RUNNER_TEMP/ipa_extension_profile.plist"
          security cms -D -i "$APP_EMBEDDED" > "$APP_PROFILE_PLIST"
          security cms -D -i "$APPEX_EMBEDDED" > "$APPEX_PROFILE_PLIST"
          APP_GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$APP_PROFILE_PLIST")
          APPEX_GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$APPEX_PROFILE_PLIST")
          if [ "$APP_GET_TASK_ALLOW" != "true" ] || [ "$APPEX_GET_TASK_ALLOW" != "true" ]; then
            echo "IPA embedded profiles are not development profiles"
            exit 1
          fi
          APP_PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$APP_PROFILE_PLIST")
          APPEX_PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$APPEX_PROFILE_PLIST")
          if [ "$APP_PROFILE_TEAM" != "$TEAM_ID" ] || [ "$APPEX_PROFILE_TEAM" != "$TEAM_ID" ]; then
            echo "IPA embedded profile team mismatch: expected $TEAM_ID"
            exit 1
          fi
          APP_ENTITLEMENTS_PLIST="$RUNNER_TEMP/app_entitlements.plist"
          APPEX_ENTITLEMENTS_PLIST="$RUNNER_TEMP/appex_entitlements.plist"
          /usr/bin/codesign -d --entitlements :- "$APP_DIR" > "$APP_ENTITLEMENTS_PLIST" 2>/dev/null
          /usr/bin/codesign -d --entitlements :- "$APPEX_DIR" > "$APPEX_ENTITLEMENTS_PLIST" 2>/dev/null
          if ! /usr/libexec/PlistBuddy -c "Print com.apple.security.application-groups:0" "$APP_ENTITLEMENTS_PLIST" | grep -q "$APP_GROUP_ID"; then
            echo "App entitlements missing expected App Group: $APP_GROUP_ID"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print com.apple.security.application-groups:0" "$APPEX_ENTITLEMENTS_PLIST" | grep -q "$APP_GROUP_ID"; then
            echo "Extension entitlements missing expected App Group: $APP_GROUP_ID"
            exit 1
          fi
          if ! /usr/libexec/PlistBuddy -c "Print com.apple.developer.networking.networkextension" "$APPEX_ENTITLEMENTS_PLIST" | grep -q "packet-tunnel-provider"; then
            echo "Extension entitlements missing packet-tunnel-provider"
            exit 1
          fi
          echo "IPA minimum iOS version: $APP_MIN_IOS"
          echo "IPA app bundle id: $APP_BUNDLE_ID"
          echo "IPA extension bundle id: $APPEX_BUNDLE_ID"

      - name: Prepare IPA artifact
        id: ipa_meta
        run: |
          set -eo pipefail
          IPA_FILE=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found in build/ios/ipa"
            exit 1
          fi
          IPA_NAME=$(basename "$IPA_FILE")
          IPA_SHA256=$(shasum -a 256 "$IPA_FILE" | awk '{print $1}')
          echo "ipa_file=$IPA_FILE" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa_sha256=$IPA_SHA256" >> "$GITHUB_OUTPUT"
          {
            echo "## IPA 构建结果"
            echo
            echo "- 文件名: $IPA_NAME"
            echo "- SHA256: $IPA_SHA256"
            echo "- 下载方式: 在本次工作流 Artifacts 中下载原始 IPA"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ipa_meta.outputs.ipa_name }}
          path: ${{ steps.ipa_meta.outputs.ipa_file }}
          if-no-files-found: error

      - name: Upload IPA direct link
        run: |
          set -eo pipefail
          IPA_FILE="${{ steps.ipa_meta.outputs.ipa_file }}"
          UPLOAD_RESPONSE=$(curl -fsS --retry 3 --retry-all-errors -F "file=@${IPA_FILE}" https://tmpfiles.org/api/v1/upload)
          IPA_PAGE_URL=$(python -c "import json,sys; data=json.loads(sys.argv[1]); print(data.get('data', {}).get('url', ''))" "$UPLOAD_RESPONSE")
          if [ -z "$IPA_PAGE_URL" ]; then
            echo "Upload to tmpfiles.org failed"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi
          IPA_DIRECT_URL=$(printf '%s' "$IPA_PAGE_URL" | sed 's#://tmpfiles.org/#://tmpfiles.org/dl/#')
          echo "IPA_PAGE_URL=$IPA_PAGE_URL" >> "$GITHUB_ENV"
          echo "IPA_DIRECT_URL=$IPA_DIRECT_URL" >> "$GITHUB_ENV"
          echo "IPA page URL: $IPA_PAGE_URL"
          echo "IPA direct URL: $IPA_DIRECT_URL"
          {
            echo
            echo "- IPA 页面地址: $IPA_PAGE_URL"
            echo "- IPA 直链: $IPA_DIRECT_URL"
            echo "- 提示: Artifacts 下载得到的是 zip，安装前请先解压取出 .ipa"
          } >> "$GITHUB_STEP_SUMMARY"
